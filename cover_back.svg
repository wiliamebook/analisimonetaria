<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 2700">
<defs>
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#051020"/>
<stop offset="100%" style="stop-color:#0a1628"/>
</linearGradient>
</defs>

<rect width="1800" height="2700" fill="url(#bgGrad)"/>

<!-- Simboli decorativi -->
<g fill="none" stroke="#e94560" stroke-width="2" opacity="0.2">
<circle cx="300" cy="300" r="200"/>
<circle cx="1500" cy="300" r="200"/>
<circle cx="300" cy="2400" r="150"/>
<circle cx="1500" cy="2400" r="150"/>
</g>

<!-- Bio Box -->
<rect x="200" y="400" width="1400" height="900" rx="30" fill="none" stroke="#e94560" stroke-width="3"/>
<rect x="230" y="430" width="1340" height="840" rx="20" fill="none" stroke="#333" stroke-width="1"/>

<!-- TITLE -->
<text x="900" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="80" fill="#e94560" font-weight="bold">L'AUTORE</text>

<!-- Author Name -->
<text x="900" y="650" text-anchor="middle" font-family="Georgia, serif" font-size="70" fill="#ffffff" font-weight="bold">William Rosettini</text>

<!-- Bio Text -->
<text x="350" y="780" font-family="Georgia, serif" font-size="45" fill="#cccccc">
<tspan x="350" dy="0">Tecnico con oltre 50 anni di esperienza</tspan>
<tspan x="350" dy="60">nel settore Tecnologico e delle</tspan>
<tspan x="350" dy="60">Telecomunicazioni.</tspan>
<tspan x="350" dy="60">Autodidatta dalle prime ore del</tspan>
<tspan x="350" dy="60">personal computing,applica il rigore</tspan>
<tspan x="350" dy="60">scientifico dell'ingegneria</tspan>
<tspan x="350" dy="60">all'analisi economica.</tspan>
</text>

<!-- Mission -->
<text x="350" y="1100" font-family="Georgia, serif" font-size="40" fill="#e94560">
<tspan x="350" dy="0">La sua missione:</tspan>
<tspan x="350" dy="50">demistificare i meccanismi</tspan>
<tspan x="350" dy="50">monetari con metodo ripetibile</tspan>
</text>

<!-- Quote -->
<text x="350" y="1250" font-family="Georgia, serif" font-size="35" fill="#666" font-style="italic">"La prova dei fatti"</text>

<!-- ISBN -->
<text x="900" y="2400" text-anchor="middle" font-family="monospace" font-size="30" fill="#444">ISBN 978-88-xxxx-xxxx-x</text>

<!-- Price -->
<text x="1600" y="400" text-anchor="end" font-family="Georgia, serif" font-size="60" fill="#e94560" font-weight="bold">€ 4,99</text>

</svg>